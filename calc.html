<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="calc.css">
    <title>Simple Calculator</title>
</head>
<body>
    <div class="container">
        <input type="text" id="input"class="input" >

        <div class="cont">
            <button class="ops" onclick="ops('+')">+</button>
            <button class="ops" onclick="ops('-')">-</button>
            <button class="ops" onclick="ops('x')">x</button>
            <button class="ops" onclick="ops('/')">/</button>
        </div>

        <div class="cont">
            <button class="nums" onclick="append('7')">7</button>
            <button class="nums" onclick="append('8')">8</button>
            <button class="nums" onclick="append('9')">9</button>
            <button class="delete" onclick="reset()">C</button>
        </div>

        <div class="cont">
            <button class="nums" onclick="append('3')">3</button>
            <button class="nums" onclick="append('4')">4</button>
            <button class="nums" onclick="append('5')">5</button>
            <button class="nums" onclick="append('6')">6</button>
            
        </div>

        <div class="cont">
            <button class="nums" onclick="append('0')">0</button>
            <button class="nums" onclick="append('1')">1</button>
            <button class="nums" onclick="append('2')">2</button>
            <button class="equal" onclick="calculate()">=</button>
        </div>

    </div>
    <script src="calc.js"></script>
</body>
</html>
